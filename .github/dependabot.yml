version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    groups:
      all:
        patterns:
          - "*"
    cooldown:
      default-days: 5

  - package-ecosystem: "npm"
    directories:
      - "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    groups:
      devDependencies:
        dependency-type: "development"
      nonMajor:
        update-types:
          - "patch"
          - "minor"
    cooldown:
      default-days: 5
      

